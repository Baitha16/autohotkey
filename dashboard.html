<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>License Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#e2e8f0;padding:24px}
.container{max-width:1200px;margin:0 auto}

/* stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat{background:#1e293b;border-radius:10px;padding:14px 16px;border:1px solid #334155}
.stat .val{font-size:24px;font-weight:700}
.stat .lbl{font-size:12px;color:#94a3b8;margin-top:2px}
.stat.active .val{color:#4ade80}
.stat.expired .val{color:#f87171}
.stat.suspended .val{color:#fbbf24}

/* toolbar */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;background:#1e293b;padding:14px 18px;border-radius:10px;border:1px solid #334155}
.toolbar select,.toolbar input{padding:8px 12px;border:1px solid #475569;border-radius:6px;font-size:13px;background:#0f172a;color:#e2e8f0}
.toolbar select:focus,.toolbar input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 2px rgba(99,102,241,.2)}
.toolbar button{padding:8px 16px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500;color:#fff;transition:all .15s;white-space:nowrap}
.btn-gen{background:#6366f1}
.btn-gen:hover{background:#4f46e5}
.btn-trial{background:#10b981}
.btn-trial:hover{background:#059669}
.search-wrap{position:relative;flex:1;min-width:160px}
.search-wrap input{width:100%;padding-left:32px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#64748b;pointer-events:none}

/* table */
.table-wrap{background:#1e293b;border-radius:10px;border:1px solid #334155;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#0f172a;text-align:left;padding:10px 12px;font-weight:600;border-bottom:2px solid #334155;color:#94a3b8;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:#e2e8f0}
th.sorted{color:#6366f1}
td{padding:10px 12px;border-bottom:1px solid #1e293b;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(99,102,241,.06)}
.code{font-family:"SF Mono","Fira Code","Courier New",monospace;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.code:hover{color:#6366f1}
.code .cpy{opacity:0;transition:opacity .15s}
.code:hover .cpy{opacity:1}
.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600}
.badge-active{background:rgba(74,222,128,.15);color:#4ade80}
.badge-expired{background:rgba(248,113,113,.15);color:#f87171}
.badge-suspended{background:rgba(251,191,36,.15);color:#fbbf24}
td button{padding:5px 12px;border:none;border-radius:4px;font-size:11px;cursor:pointer;color:#fff;margin-right:4px;transition:all .15s}
.btn-ext{background:#6366f1}
.btn-ext:hover{background:#4f46e5}
.btn-sus{background:#d97706}
.btn-sus:hover{background:#b45309}
.btn-del{background:#ef4444}
.btn-del:hover{background:#dc2626}
.btn-unsus{background:#10b981}
.btn-unsus:hover{background:#059669}
td button:disabled{opacity:.4;cursor:not-allowed}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px}
.pagination button{padding:6px 12px;border:1px solid #475569;border-radius:6px;background:#0f172a;color:#e2e8f0;cursor:pointer;font-size:12px;transition:all .15s}
.pagination button:hover:not(:disabled){border-color:#6366f1;color:#6366f1}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
.pagination .page-info{font-size:12px;color:#94a3b8}

/* toast */
.toast{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:slideIn .2s ease;min-width:240px}
.toast-item.ok{background:#065f46;border:1px solid #10b981;color:#a7f3d0}
.toast-item.err{background:#7f1d1d;border:1px solid #ef4444;color:#fecaca}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:998;display:flex;align-items:center;justify-content:center}
.modal{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:24px;min-width:340px;max-width:90vw;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.modal h3{font-size:16px;margin-bottom:12px}
.modal p{font-size:13px;color:#94a3b8;margin-bottom:16px}
.modal .actions{display:flex;gap:8px;justify-content:flex-end}
.modal button{padding:8px 20px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500;transition:all .15s}
.modal .btn-cancel{background:#334155;color:#e2e8f0}
.modal .btn-cancel:hover{background:#475569}
.modal .btn-confirm{background:#6366f1;color:#fff}
.modal .btn-confirm:hover{background:#4f46e5}
.modal .btn-danger{background:#ef4444;color:#fff}
.modal .btn-danger:hover{background:#dc2626}
.modal label{display:block;font-size:13px;color:#94a3b8;margin-bottom:4px}
.modal input[type=number]{width:100%;padding:8px 12px;border:1px solid #475569;border-radius:6px;background:#0f172a;color:#e2e8f0;font-size:13px;margin-bottom:12px}
.modal input[type=number]:focus{outline:none;border-color:#6366f1}

.empty{text-align:center;padding:40px 20px;color:#64748b;font-size:14px}
.loading{text-align:center;padding:40px 20px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #334155;border-top-color:#6366f1;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)} .toolbar{flex-direction:column;align-items:stretch}.search-wrap{min-width:0}}
</style>
</head>
<body>
<div class="container"><div id="root"></div></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const BASE = "https://mrynitasirdzzfsmcaqh.supabase.co/functions/v1";
const { useState, useEffect, useMemo, useCallback } = React;

function useToasts() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((text, err) => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, text, err }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 2500);
  }, []);
  return { toasts, add };
}

function useConfirm() {
  const [state, setState] = useState(null);
  const confirm = useCallback((msg, danger) => new Promise(res => {
    setState({ msg, danger, resolve: res });
  }), []);
  const close = useCallback(() => setState(null), []);
  return { state, confirm, close };
}

function usePrompt() {
  const [state, setState] = useState(null);
  const prompt = useCallback((msg, def) => new Promise(res => {
    setState({ msg, def: String(def), resolve: res });
  }), []);
  const close = useCallback(() => setState(null), []);
  return { state, prompt, close };
}

function Toast({ toasts }) {
  if (!toasts.length) return null;
  return <div className="toast">{toasts.map(t => (
    <div key={t.id} className={"toast-item "+(t.err?"err":"ok")}>{t.err?"ERR: ":"OK: "}{t.text}</div>
  ))}</div>;
}

function ConfirmModal({ state, close }) {
  if (!state) return null;
  return <div className="modal-overlay" onClick={close}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h3>Confirm</h3><p>{state.msg}</p>
      <div className="actions">
        <button className="btn-cancel" onClick={()=>{state.resolve(false);close()}}>Cancel</button>
        <button className={state.danger?"btn-danger":"btn-confirm"} onClick={()=>{state.resolve(true);close()}}>Confirm</button>
      </div>
    </div>
  </div>;
}

function PromptModal({ state, close }) {
  const [val, setVal] = useState(state?.def||"");
  useEffect(() => { if(state) setVal(state.def) }, [state]);
  if (!state) return null;
  return <div className="modal-overlay" onClick={close}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h3>{state.msg}</h3>
      <label>Duration (days)</label>
      <input type="number" value={val} onChange={e=>setVal(e.target.value)} min={1} autoFocus />
      <div className="actions">
        <button className="btn-cancel" onClick={()=>{state.resolve(null);close()}}>Cancel</button>
        <button className="btn-confirm" onClick={()=>{state.resolve(val);close()}}>Extend</button>
      </div>
    </div>
  </div>;
}

function copy(text, add) {
  navigator.clipboard.writeText(text).then(() => add("Copied: "+text), () => add("Copy failed", true));
}

function App() {
  const [licenses, setLicenses] = useState([]);
  const [loading, setLoading] = useState(true);
  const [type, setType] = useState("monthly");
  const [days, setDays] = useState(30);
  const [phone, setPhone] = useState("");
  const [search, setSearch] = useState("");
  const [sortCol, setSortCol] = useState("created_at");
  const [sortDir, setSortDir] = useState("desc");
  const [page, setPage] = useState(0);
  const pageSize = 15;
  const { toasts, add } = useToasts();
  const confirm = useConfirm();
  const prompt = usePrompt();

  const changeType = (t) => {
    setType(t);
    if (t === "monthly") setDays(30);
    else if (t === "weekly") setDays(7);
  };

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const r = await fetch(BASE+"/list-licenses");
      const d = await r.json();
      if (d.success) setLicenses(d.data);
      else add(d.error, true);
    } catch(e){ add(e.message, true) }
    finally{ setLoading(false) }
  }, [add]);

  useEffect(() => { load() }, [load]);

  const stats = useMemo(() => {
    const s = { total: licenses.length, active: 0, expired: 0, suspended: 0 };
    licenses.forEach(l => { if (s.hasOwnProperty(l.status)) s[l.status]++ });
    return s;
  }, [licenses]);

  const filtered = useMemo(() => {
    if (!search.trim()) return licenses;
    const q = search.trim().toLowerCase();
    return licenses.filter(l =>
      l.license_code.toLowerCase().includes(q) ||
      l.membership_type.toLowerCase().includes(q) ||
      l.status.toLowerCase().includes(q)
    );
  }, [licenses, search]);

  const sorted = useMemo(() => {
    const arr = [...filtered];
    arr.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (sortCol === "expires_at" || sortCol === "created_at" || sortCol === "last_used_at") {
        va = va ? new Date(va).getTime() : 0;
        vb = vb ? new Date(vb).getTime() : 0;
      }
      if (va < vb) return sortDir === "asc" ? -1 : 1;
      if (va > vb) return sortDir === "asc" ? 1 : -1;
      return 0;
    });
    return arr;
  }, [filtered, sortCol, sortDir]);

  const totalPages = Math.ceil(sorted.length / pageSize) || 1;
  const paged = sorted.slice(page * pageSize, (page + 1) * pageSize);

  useEffect(() => { setPage(0) }, [search, sortCol, sortDir]);

  const toggleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortCol(col); setSortDir("asc") }
  };

  const sorter = (col) => sortCol === col ? (sortDir === "asc" ? " ▲" : " ▼") : "";

  const generate = async () => {
    const body = { membership_type: type };
    if (type !== "lifetime") body.duration_days = +days;
    if (phone.trim()) body.phone = phone.trim();
    try {
      const r = await fetch(BASE+"/generate-code", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
      const d = await r.json();
      if (d.success) add("Generated: "+d.license_code);
      else add(d.error, true);
      load();
    } catch(e){ add(e.message, true) }
  };

  const genTrial = async () => {
    try {
      const r = await fetch(BASE+"/generate-trial", { method:"POST", headers:{"Content-Type":"application/json"}, body:"{}" });
      const d = await r.json();
      if (d.success) add("Trial: "+d.license_code);
      else add(d.error, true);
      load();
    } catch(e){ add(e.message, true) }
  };

  const act = async (code, endpoint, successMsg) => {
    if (endpoint === "delete-license") {
      const ok = await confirm.confirm("Delete license "+code+"? This cannot be undone.", true);
      if (!ok) return;
    }
    if (endpoint === "suspend-license") {
      const ok = await confirm.confirm("Suspend license "+code+"?", false);
      if (!ok) return;
    }
    let body = { license_code: code };
    if (endpoint === "extend-license") {
      const d = await prompt.prompt("Extend license "+code, 30);
      if (!d) return;
      body.duration_days = +d;
    }
    try {
      const r = await fetch(BASE+"/"+endpoint, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
      const d = await r.json();
      if (d.success) add(successMsg+": "+code);
      else add(d.error, true);
      load();
    } catch(e){ add(e.message, true) }
  };

  const formatDate = (d) => {
    if (!d) return "-";
    const date = new Date(d);
    const now = Date.now();
    const diff = date.getTime() - now;
    const abs = Math.abs(diff);
    const rel = abs < 60000 ? "just now" :
      abs < 3600000 ? Math.floor(abs/60000)+"m" :
      abs < 86400000 ? Math.floor(abs/3600000)+"h" :
      Math.floor(abs/86400000)+"d";
    return date.toLocaleDateString()+" "+date.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})+" ("+(diff>0?"+":"-")+rel+")";
  };

  return (
    <div>
      <Toast toasts={toasts} />
      <ConfirmModal state={confirm.state} close={confirm.close} />
      <PromptModal state={prompt.state} close={prompt.close} />

      <h2 style={{fontSize:22,fontWeight:700,marginBottom:6}}>License Dashboard</h2>
      <p style={{fontSize:13,color:"#94a3b8",marginBottom:20}}>{licenses.length} total licenses</p>

      <div className="stats">
        <div className="stat"><div className="val">{stats.total}</div><div className="lbl">Total</div></div>
        <div className="stat active"><div className="val">{stats.active}</div><div className="lbl">Active</div></div>
        <div className="stat expired"><div className="val">{stats.expired}</div><div className="lbl">Expired</div></div>
        <div className="stat suspended"><div className="val">{stats.suspended}</div><div className="lbl">Suspended</div></div>
      </div>

      <div className="toolbar">
        <select value={type} onChange={e=>changeType(e.target.value)}>
          <option>monthly</option><option>weekly</option><option>lifetime</option>
        </select>
        {type !== "lifetime" && <input type="number" value={days} readOnly style={{width:60,background:"#0f172a",textAlign:"center"}} />}
        <input value={phone} onChange={e=>setPhone(e.target.value)} style={{width:150}} placeholder="Phone (EZ code)" />
        <button className="btn-gen" onClick={generate}>Generate</button>
        <button className="btn-trial" onClick={genTrial}>Trial 1h</button>
        <div className="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." />
        </div>
      </div>

      <div className="table-wrap">
      {loading ? <div className="loading"><div className="spinner"></div></div> : sorted.length === 0 ? (
        <div className="empty">{search ? "No licenses match your search." : "No licenses yet."}</div>
      ) : (
        <>
        <table>
          <thead><tr>
            <th className={sortCol==="license_code"?"sorted":""} onClick={()=>toggleSort("license_code")}>Code{sorter("license_code")}</th>
            <th className={sortCol==="membership_type"?"sorted":""} onClick={()=>toggleSort("membership_type")}>Type{sorter("membership_type")}</th>
            <th className={sortCol==="expires_at"?"sorted":""} onClick={()=>toggleSort("expires_at")}>Expires{sorter("expires_at")}</th>
            <th className={sortCol==="last_used_at"?"sorted":""} onClick={()=>toggleSort("last_used_at")}>Last Used{sorter("last_used_at")}</th>
            <th className={sortCol==="created_at"?"sorted":""} onClick={()=>toggleSort("created_at")}>Created{sorter("created_at")}</th>
            <th className={sortCol==="status"?"sorted":""} onClick={()=>toggleSort("status")}>Status{sorter("status")}</th>
            <th>Action</th>
          </tr></thead>
          <tbody>{paged.map((l,i) => (
            <tr key={l.id || i}>
              <td><span className="code" onClick={()=>copy(l.license_code, add)}>{l.license_code}<span className="cpy">📋</span></span></td>
              <td style={{textTransform:"capitalize"}}>{l.membership_type}</td>
              <td>{l.membership_type==="lifetime" ? "Lifetime" : formatDate(l.expires_at)}</td>
              <td style={{color:l.last_used_at?"#e2e8f0":"#64748b"}}>{l.last_used_at ? formatDate(l.last_used_at) : "Never"}</td>
              <td>{formatDate(l.created_at)}</td>
              <td><span className={"badge badge-"+l.status}>{l.status}</span></td>
              <td style={{whiteSpace:"nowrap"}}>
                <button className="btn-ext" disabled={l.status==="expired"} onClick={()=>act(l.license_code,"extend-license","Extended")}>Extend</button>
                {l.status==="suspended" ? (
                  <button className="btn-unsus" onClick={()=>act(l.license_code,"suspend-license","Unsuspended")}>Unsuspend</button>
                ) : (
                  <button className="btn-sus" disabled={l.status==="expired"} onClick={()=>act(l.license_code,"suspend-license","Suspended")}>Suspend</button>
                )}
                <button className="btn-del" onClick={()=>act(l.license_code,"delete-license","Deleted")}>Delete</button>
              </td>
            </tr>
          ))}</tbody>
        </table>
        {totalPages > 1 && (
          <div className="pagination">
            <button disabled={page===0} onClick={()=>setPage(p=>p-1)}>Prev</button>
            <span className="page-info">Page {page+1} of {totalPages}</span>
            <button disabled={page>=totalPages-1} onClick={()=>setPage(p=>p+1)}>Next</button>
          </div>
        )}
        </>
      )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
